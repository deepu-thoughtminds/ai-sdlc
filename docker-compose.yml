services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-local}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    networks:
      - ai-sdlc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    volumes:
      - ./hermes:/app/hermes
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MCP_ATLASSIAN_URL=${MCP_ATLASSIAN_URL:-http://mcp-atlassian:9000/mcp}
    depends_on:
      - mcp-atlassian
    networks:
      - ai-sdlc-net
    ports:
      - "8001:8001"

  mcp-atlassian:
    image: ghcr.io/sooperset/mcp-atlassian:latest
    environment:
      - TRANSPORT=streamable-http
      - PORT=9000
      # Global Jira config required so mcp-atlassian loads a JiraConfig at startup.
      # Per-request credentials (Authorization: Basic header from hermes) override
      # username/api_token at call time — global config only provides the URL + SSL base.
      - JIRA_URL=${JIRA_URL}
      - JIRA_USERNAME=${JIRA_ACCOUNT_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      # Global Confluence config — same Atlassian Cloud instance as Jira, so we reuse
      # JIRA_URL and JIRA_API_TOKEN. Required for mcp-atlassian to load ConfluenceConfig
      # at startup; per-request credentials from hermes headers override auth at call time.
      - CONFLUENCE_URL=${JIRA_URL}
      - CONFLUENCE_USERNAME=${JIRA_ACCOUNT_EMAIL}
      - CONFLUENCE_API_TOKEN=${JIRA_API_TOKEN}
    ports:
      - "9000:9000"
    networks:
      - ai-sdlc-net
    restart: unless-stopped

  # MongoDB is hosted on MongoDB Atlas — no local mongo container. The backend
  # connects to whatever MONGODB_URI points at (set in .env). See .env.example
  # for the Atlas SRV connection-string format.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp  # share host /tmp so workspace paths created by tempfile.mkdtemp() are visible to the host Docker daemon
    env_file: .env
    environment:
      - HERMES_BASE_URL=http://hermes:8001
      - DOCKER_SOCKET=/var/run/docker.sock
      - QA_SANDBOX_IMAGE=${QA_SANDBOX_IMAGE:-qa-sandbox}
      - SONAR_URL=${SONAR_URL:-http://sonarqube:9000}
      - SONAR_TIMEOUT_SECONDS=${SONAR_TIMEOUT_SECONDS:-300}
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI must be set (Atlas SRV string) in .env}
      - MONGODB_DB=${MONGODB_DB:-aisdlc}
    depends_on:
      hermes:
        condition: service_started
      litellm:
        condition: service_started
      sonarqube:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - ai-sdlc-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_API_TOKEN: ${NEXT_PUBLIC_API_TOKEN}
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - ai-sdlc-net

  qa-sandbox:
    build:
      context: ./qa-sandbox
      dockerfile: Dockerfile
    image: qa-sandbox
    networks:
      - ai-sdlc-net

  sonarqube:
    image: sonarqube:lts-community
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    ports:
      - "9001:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - ai-sdlc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

networks:
  ai-sdlc-net:
    driver: bridge

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
