services:
  freellmapi:
    build:
      context: ./freellmapi
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - ENCRYPTION_KEY=${FREELLMAPI_ENCRYPTION_KEY}
      - PORT=3001
      - HOST_BIND=0.0.0.0
    volumes:
      - freellmapi_data:/app/server/data
    networks:
      - ai-sdlc-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/ping').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    volumes:
      - ./hermes:/app/hermes
    env_file: .env
    depends_on:
      - freellmapi
    networks:
      - ai-sdlc-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - app_data:/app/data
    env_file: .env
    depends_on:
      - hermes
    ports:
      - "8000:8000"
    networks:
      - ai-sdlc-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - ai-sdlc-net

networks:
  ai-sdlc-net:
    driver: bridge

volumes:
  app_data:
  freellmapi_data:
