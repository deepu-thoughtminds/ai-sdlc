services:
  freellmapi:
    build:
      context: ./freellmapi
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - ENCRYPTION_KEY=${FREELLMAPI_ENCRYPTION_KEY}
      - PORT=3001
      - HOST_BIND=0.0.0.0
    volumes:
      - freellmapi_data:/app/server/data
    networks:
      - ai-sdlc-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/ping').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    volumes:
      - ./hermes:/app/hermes
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FREELLMAPI_BASE_URL=${FREELLMAPI_BASE_URL:-http://freellmapi:3001/v1}
      - FREELLMAPI_API_KEY=${FREELLMAPI_API_KEY:-}
      - MCP_ATLASSIAN_URL=${MCP_ATLASSIAN_URL:-http://mcp-atlassian:9000/sse}
    depends_on:
      - freellmapi
      - mcp-atlassian
    networks:
      - ai-sdlc-net

  mcp-atlassian:
    image: sooperset/mcp-atlassian:latest
    environment:
      - TRANSPORT=sse
      - PORT=9000
      # JIRA_URL, JIRA_USERNAME, JIRA_API_TOKEN intentionally omitted — their
      # absence activates per-request (multi-user) credential mode. Setting them
      # would lock the server to a single Jira instance and expose credentials
      # in `docker inspect` output (T-07-01).
    ports:
      - "9000:9000"
    networks:
      - ai-sdlc-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - app_data:/app/data
    env_file: .env
    depends_on:
      - hermes
    ports:
      - "8000:8000"
    networks:
      - ai-sdlc-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - ai-sdlc-net

networks:
  ai-sdlc-net:
    driver: bridge

volumes:
  app_data:
  freellmapi_data:
