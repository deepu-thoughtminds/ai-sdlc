services:
  freellmapi:
    build:
      context: ./freellmapi
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - ENCRYPTION_KEY=${FREELLMAPI_ENCRYPTION_KEY}
      - PORT=3001
      - HOST_BIND=0.0.0.0
    volumes:
      - freellmapi_data:/app/server/data
    networks:
      - ai-sdlc-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/ping').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-local}
      - FREELLMAPI_API_KEY=${FREELLMAPI_API_KEY:-}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    depends_on:
      - freellmapi
    networks:
      - ai-sdlc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  hermes:
    build:
      context: ./hermes
      dockerfile: Dockerfile
    volumes:
      - ./hermes:/app/hermes
    env_file: .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FREELLMAPI_BASE_URL=${FREELLMAPI_BASE_URL:-http://freellmapi:3001/v1}
      - FREELLMAPI_API_KEY=${FREELLMAPI_API_KEY:-}
      - MCP_ATLASSIAN_URL=${MCP_ATLASSIAN_URL:-http://mcp-atlassian:9000/mcp}
    depends_on:
      - freellmapi
      - mcp-atlassian
    networks:
      - ai-sdlc-net
    ports:
      - "8001:8001"

  mcp-atlassian:
    image: ghcr.io/sooperset/mcp-atlassian:latest
    environment:
      - TRANSPORT=streamable-http
      - PORT=9000
      # Global Jira config required so mcp-atlassian loads a JiraConfig at startup.
      # Per-request credentials (Authorization: Basic header from hermes) override
      # username/api_token at call time — global config only provides the URL + SSL base.
      - JIRA_URL=${JIRA_URL}
      - JIRA_USERNAME=${JIRA_ACCOUNT_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      # Global Confluence config — same Atlassian Cloud instance as Jira, so we reuse
      # JIRA_URL and JIRA_API_TOKEN. Required for mcp-atlassian to load ConfluenceConfig
      # at startup; per-request credentials from hermes headers override auth at call time.
      - CONFLUENCE_URL=${JIRA_URL}
      - CONFLUENCE_USERNAME=${JIRA_ACCOUNT_EMAIL}
      - CONFLUENCE_API_TOKEN=${JIRA_API_TOKEN}
    ports:
      - "9000:9000"
    networks:
      - ai-sdlc-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - app_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp  # share host /tmp so workspace paths created by tempfile.mkdtemp() are visible to the host Docker daemon
    env_file: .env
    environment:
      - HERMES_BASE_URL=http://hermes:8001
      - DOCKER_SOCKET=/var/run/docker.sock
      - QA_SANDBOX_IMAGE=${QA_SANDBOX_IMAGE:-qa-sandbox}
    depends_on:
      - hermes
      - litellm
    ports:
      - "8000:8000"
    networks:
      - ai-sdlc-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - ai-sdlc-net

  qa-sandbox:
    build:
      context: ./qa-sandbox
      dockerfile: Dockerfile
    image: qa-sandbox
    networks:
      - ai-sdlc-net

networks:
  ai-sdlc-net:
    driver: bridge

volumes:
  app_data:
  freellmapi_data:
