model_list:
  # Primary: DeepSeek V4 Flash Free via opencode.ai Zen
  - model_name: deepseek-v4-flash-free
    litellm_params:
      model: openai/deepseek-v4-flash-free
      api_base: https://opencode.ai/zen/v1
      api_key: os.environ/OPENCODE_API_KEY
      drop_params: true

  # Secondary: MiMo V2.5 Free via opencode.ai Zen
  - model_name: mimo-v2.5-free
    litellm_params:
      model: openai/mimo-v2.5-free
      api_base: https://opencode.ai/zen/v1
      api_key: os.environ/OPENCODE_API_KEY
      drop_params: true

  # Claude Code SDK hardcodes claude-sonnet-4-6 — alias to DeepSeek as primary
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: openai/deepseek-v4-flash-free
      api_base: https://opencode.ai/zen/v1
      api_key: os.environ/OPENCODE_API_KEY
      drop_params: true

general_settings:
  master_key: "sk-litellm-local"
  drop_params: true
